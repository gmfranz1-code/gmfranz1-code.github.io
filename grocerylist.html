    <main>
      <p>This is where you can build out your weekly grocery list!
        Add items to your list and delete them when you have purchased them. Happy shopping!</p>
      </p>
    
   <div class="grocery-container">
    <h2>Grocery List</h2>

    <input type="text" id="groceryInput" placeholder="Enter grocery item">
    <button type="button" onclick="addItem()">Add</button>

    <ul id="groceryList"></ul>
  </div>

  <script>
  function addItem() {
    const input = document.getElementById("groceryInput");
    const itemText = input.value.trim();

    if (itemText === "") {
      alert("Please enter an item.");
      return;
    }

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = itemText;

    const removeButton = document.createElement("button");
    removeButton.textContent = "Delete";
    removeButton.onclick = function () {
      li.remove();
    };

    li.appendChild(span);
    li.appendChild(removeButton);

    document.getElementById("groceryList").appendChild(li);

    input.value = "";
  }
</script>
